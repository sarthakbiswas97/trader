services:
  trader:
    build: .
    ports:
      - "8000:8000"  # Backend API
      - "3000:3000"  # Frontend
    env_file:
      - .env
    volumes:
      # Persist trading data across restarts
      - trader_data:/app/backend/data
      # Persist auth session
      - ./.kite_session:/app/.kite_session
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  trader_data:
